name: opt-out-export dev deploy

on:
  workflow_dispatch:
    inputs:
      octocats:
        description: environment
        required: false
        default: 'dev'
  push:
    branches:
      - main
    paths:
      - lambda/opt-out-export/**
      - .github/workflows/opt-out-export-dev-deploy.yml

jobs:
  test:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    env:
      INPUT_ENVIRONMENT: ${{ github.event.inputs.octocats }}
    environment: ${{ github.event.inputs.octocats }}
    steps:
      - name: Write out env
        run: env
