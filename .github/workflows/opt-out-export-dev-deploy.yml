name: opt-out-export dev deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: environment
        required: false
        default: 'dev'
  push:
    branches:
      - main
    paths:
      - lambda/opt-out-export/**
      - .github/workflows/opt-out-export-dev-deploy.yml

jobs:
  test:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lambda/opt-out-export
    environment: $INPUT_ENVIRONMENT
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
      - name: Build opt-out-export zip file
        env:
          CGO_ENABLED: 0
        run: |
          go build -o bootstrap main.go db.go
          zip function.zip bootstrap
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/delegatedadmin/developer/dpc-${{ INPUT_ENVIRONMENT }}-github-actions
      - name: Upload and reload
        run: |
          aws s3 cp --no-progress function.zip \
            s3://dpc-$INPUT_ENVIRONMENT-opt-out-export-function/function-${{ github.sha }}.zip
          aws lambda update-function-code --function-name dpc-$INPUT_ENVIRONMENT-opt-out-export \
            --s3-bucket dpc-$INPUT_ENVIRONMENT-opt-out-export-function --s3-key function-${{ github.sha }}.zip
