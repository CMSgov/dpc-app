name: Create DPC Portal Invite

on:
  pull_request:
  workflow_dispatch:
    inputs:
      env:
        description: AWS environment to check
        required: true
        type: 'string'
        default: 'test'
      initial_tag:
        description: Initials to tag temp service
        required: true
        type: 'string'
      org_npi:
        description: Organization NPI
        required: true
        type: 'string'
      given_name:
        description: Given name
        required: true
        type: 'string'
      family_name:
        description: Family name
        required: true
        type: 'string'
      email:
        description: Email address
        required: true
        type: 'string'

permissions:
  id-token: write
  contents: read

jobs:
  create-portal-invite:
    name: Create DPC Portal Invite
    runs-on: codebuild-dpc-app-${{github.run_id}}-${{github.run_attempt}}
    steps:
      - name: Assert Ownership
        run: sudo chmod -R 777 .
      - name: Checkout code
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          path: dpc-app
      - name: AWS Credentials (non-prod)
#        if: ${{ inputs.env == 'dev' || inputs.env == 'test' }}
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.NON_PROD_ACCOUNT_ID }}:role/delegatedadmin/developer/dpc-${{ inputs.env || 'test' }}-github-actions
#      - name: AWS Credentials (prod)
#        if: ${{ inputs.env == 'sandbox' || inputs.env == 'prod' }}
#        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
#        with:
#          aws-region: ${{ vars.AWS_REGION }}
#          role-to-assume: arn:aws:iam::${{ secrets.PROD_ACCOUNT_ID }}:role/delegatedadmin/developer/dpc-${{ inputs.env }}-github-actions
      - name: Install AWS Session Manager Plugin
        run: |
          sudo dnf install -y https://s3.amazonaws.com/session-manager-downloads/plugin/latest/linux_64bit/session-manager-plugin.rpm
      - name: Set cluster and service names
        run: |
          echo "CLUSTER_NAME=dpc-${{ inputs.env || 'test' }}-frontend" >> $GITHUB_ENV
          echo "SERVICE_NAME=dpc-${{ inputs.env || 'test' }}-web-portal-v9" >> $GITHUB_ENV
      - name: Start temp service
        run: ./dpc-app/scripts/start_temp_service.sh $CLUSTER_NAME $SERVICE_NAME ${{ inputs.initial_tag || 'aw' }}
      - name: Set env vars
        run: |
          echo "TASK_DEF=$TASK_DEF" >> $GITHUB_ENV
          echo "NEW_TASK_ID=$NEW_TASK_ID" >> $GITHUB_ENV
          echo "NEW_SERVICE_NAME=$NEW_SERVICE_NAME" >> $GITHUB_ENV
          echo "NEW_CONTAINER_NAME=$NEW_CONTAINER_NAME" >> $GITHUB_ENV
      - name: Generate invite link
        env:
          RAILS_CMD: rails dpc:invite_ao INVITE=${{ inputs.given_name || 'Ashley' }},${{ inputs.family_name || 'Weaver' }},${{ inputs.email || 'ashleyweaver@navapbc.com' }},${{ inputs.org_npi || '3058847591' }}
        run: |
          aws ecs execute-command  \
          --region ${{ vars.AWS_REGION }} \
          --cluster $CLUSTER_NAME \
          --task $NEW_TASK_ID \
          --container $NEW_CONTAINER_NAME \
          --command "$RAILS_CMD " \
          --non-interactive
      - name: Delete temp service
        run: |
          aws ecs delete-service \
            --force \
            --cluster $CLUSTER_NAME \
            --service $NEW_SERVICE_NAME
      - name: Deregister the task definition
        run: aws ecs deregister-task-definition --task-definition $TASK_DEF
