name: "DPC CI Workflow"

on:
  pull_request:
    paths:
      - .github/workflows/ci-workflow.yml
      - dpc-admin/**
      - dpc-aggregation/**
      - dpc-api/**
      - dpc-attribution/**
      - dpc-bluebutton/**
      - dpc-common/**
      - dpc-macaroons/**
      - dpc-portal/**
      - dpc-queue/**
      - dpc-smoketest/**
      - dpc-test.sh
      - dpc-testing/**
      - dpc-web/**
      - engines/**
      - pom.xml
      - src/**
  workflow_dispatch: # Allow manual trigger

permissions:
  id-token: write
  contents: read

concurrency:
  group: ci-workflow-${{ github.ref }}
  cancel-in-progress: true

env:
  VAULT_PW: ${{ secrets.VAULT_PW }}
  REPORT_COVERAGE: true
  DPC_CA_CERT: ${{ secrets.DPC_CA_CERT }}
  ENV: "github-ci"

jobs:
  build-dpc-client:
    name: "Build and Test DPC Client"
    runs-on: codebuild-dpc-app-${{github.run_id}}-${{github.run_attempt}}
    steps:
      - name: Assert Ownership
        run: sudo chmod -R 777 .
      - name: "Checkout code"
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
      - name: Cleanup Runner
        run: ./scripts/cleanup-docker.sh
      - name: "DPC Client Build"
        run: |
          make ci-api-client
          make dpc-client-integration-test
      - name: Cleanup
        if: ${{ always() }}
        run: ./scripts/cleanup-docker.sh
