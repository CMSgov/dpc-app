name: 'Onboard Organization to API'

on:
  workflow_dispatch:
    inputs:
      env:
        description: AWS environment to onboard
        required: true
        type: string
      name:
        description: Name of Organization
        required: true
        type: string
      npi:
        description: NPI of Organization
        required: true
        type: string
      public_key:
        description: Public Key of Organization
        required: true
        type: string
      snippet:
        description: Snippet Signature of Public Key
        required: true
        type: string
        
permissions:
  id-token: write
  contents: read

jobs:
  onboard:
    permissions:
      contents: read
      id-token: write
    runs-on: codebuild-dpc-app-${{github.run_id}}-${{github.run_attempt}}
    steps:
      - name: AWS Credentials (non-prod)
        if: ${{ inputs.env == 'dev' || inputs.env == 'test' }}
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.NON_PROD_ACCOUNT_ID }}:role/delegatedadmin/developer/dpc-${{ inputs.env }}-github-actions
      - name: AWS Credentials (prod)
        if: ${{ inputs.env == 'sandbox' || inputs.env == 'prod' }}
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.PROD_ACCOUNT_ID }}:role/delegatedadmin/developer/dpc-${{ inputs.env }}-github-actions
      - name: Assert Ownership
        run: sudo chmod -R 777 .
      - name: "Checkout code"
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
      - name: Cleanup Runner
        run: ./scripts/cleanup-docker.sh
      - uses: cmsgov/cdap/actions/aws-params-env-action@main
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        with:
          params: |
            GOLDEN_MACAROON=/dpc/${{ inputs.env }}/web/golden_macaroon
      - name: Onboard
        run: |
          docker compose -f docker-compose.yml -f docker-compose.portals.yml run \
          -e API_METADATA_URL="https://${{ inputs.env }}.dpc.cms.gov/api/v1" \
          --entrypoint 'bundle exec rails dpc:onboard NAME="${{ inputs.name} }} NPI="${{ inputs.npi }}" PUBLIC_KEY="${{ inputs.public_key }}" SNIPPET="${{ inputs.snippet }}"' dpc_portal
      - name: Zip files
        run: |
          zip credentials.zip organization.txt key64.txt iv64.txt token64.txt
      - name: Upload
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
          name: credentials-for-${{ inputs.name }}
          path: credentials.zip
          retention-days: 1
