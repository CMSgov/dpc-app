name: 'Tag Static Site'

on:
  push:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deploy where?
        required: false
        default: 'do not deploy'
        type: choice
        options:
          - 'do not deploy'
          - staging
      static_repo_ref:
        description: Which branch or tag
        required: true
        default: 'main'
        type: 'string'
jobs:
  tag_static_site:
    name: Tag Static Site
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          repository: 'CMSgov/dpc-static-site'
      - name: git
        run: |
          # setup the username and email. I tend to use 'GitHub Actions Bot' with no email by default
          echo fetching
          git fetch --quiet
          echo describing
          last_rev=`git describe --tags --abbrev=0 --match 'r*'`
          git log --pretty=format:"- %s" $last_rev..HEAD
          last_rev_num=${last_rev/r}
          next_rev_num=$((last_rev_num + 1))
          next_rev=r$next_rev_num
          echo $next_rev
