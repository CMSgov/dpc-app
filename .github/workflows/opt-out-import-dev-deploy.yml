name: 'Tag Static Site'

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deploy where?
        required: false
        default: 'do not deploy'
        type: choice
        options:
          - 'do not deploy'
          - staging
      static_repo_ref:
        description: Which branch or tag
        required: true
        default: 'main'
        type: 'string'
jobs:
  tag_static_site:
    name: Tag Static Site
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          repository: 'CMSgov/dpc-static-site'
          ref: ${{ inputs.static_repo_ref }}
      - name: "Git tag info"
        run: which git
